<!DOCTYPE html>
<html lang="ru">
<!-- Страница упразднена: отслеживание заказа живёт в личном кабинете на главной.
     Сервер редиректит /track → /?track=…, этот файл — подстраховка на случай
     прямого открытия файла. Можно удалить вместе с index-old-design-backup.html. -->
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex">
  <title>Статус заказа · ЛавашОК</title>
  <script>
    location.replace('/?track=' + encodeURIComponent(new URLSearchParams(location.search).get('t') || ''));
  </script>
</head>
<body>
  <p>Перенаправляем на страницу заказа… <a href="/">На главную</a></p>
</body>
</html>
