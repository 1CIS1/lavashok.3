<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="ЛавашОК — шаурма и лаваши с доставкой">
  <rect width="1200" height="630" fill="#C0251C"/>
  <circle cx="1060" cy="120" r="260" fill="#A81F17"/>
  <circle cx="150" cy="560" r="200" fill="#A81F17"/>

  <!-- Логотип-бейдж -->
  <g transform="translate(90,90)">
    <rect width="96" height="96" rx="22" fill="#FFB800"/>
    <text x="48" y="68" font-family="Arial, 'Segoe UI', sans-serif" font-size="56" font-weight="900" fill="#C0251C" text-anchor="middle">Л</text>
  </g>
  <text x="210" y="158" font-family="Arial, 'Segoe UI', sans-serif" font-size="46" font-weight="900" fill="#FFFFFF">ЛавашОК</text>

  <!-- Заголовок -->
